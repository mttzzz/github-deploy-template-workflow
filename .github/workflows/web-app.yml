name: deploy template
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
        default: 'web-app'
      helm_chart:
        required: false
        type: string
        default: 'web-app'
      params:
        description: 'Parameters for Helm Chart'
        required: false
        type: string
      with_submodules:
        description: 'Checkout submodules'
        required: false
        type: boolean
        default: false
      cache_mode:
        description: 'Cache mode'
        required: false
        type: string
        default: 'min'
      # Выжимка стандартных раннеров (бенч 2026-07, mailer): build приложения на раннере
      # быстрее multi-stage docker-билда (нет docker-налога на install), а КЭШИ НЕ ИСПОЛЬЗУЮТСЯ
      # НАМЕРЕННО — restore из сети (gha/registry/actions-cache) стабильно дороже холодной
      # пересборки (bun install ~4-6s против 8-22s restore). Требования к репо в host-режиме:
      # package.json script `build:host` (полный build до .output) + `Dockerfile.host`
      # (тонкая упаковка .output). Контекст сборки — корень репо (docker_context игнорируется).
      build_mode:
        description: 'Стратегия сборки: docker (default, multi-stage Dockerfile) | host (build на раннере, docker только пакует .output через Dockerfile.host).'
        required: false
        type: string
        default: 'docker'
      build_runner:
        description: 'Runner for build-docker job'
        required: false
        type: string
        default: 'ubuntu-latest'
      sentry_project:
        description: 'Sentry project slug (если отличается от app_name). Пусто → fallback на app_name. Пусто + нет SENTRY_AUTH_TOKEN → sentry-finalize пропускается.'
        required: false
        type: string
        default: ''
      # Монорепо: путь контекста сборки + Dockerfile + суффикс repo для образа — раздельные деплои
      # app (корень) и микросервисов (services/<name>/) одним шаблоном. Default = поведение app:
      # context=., Dockerfile в корне, без суффикса → другие проекты не затронуты.
      docker_context:
        description: 'Build context (монорепо-сервис → services/<name>).'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Путь к Dockerfile от корня репо.'
        required: false
        type: string
        default: 'Dockerfile'
      image_suffix:
        description: 'Суффикс repo образа (напр. "-doc-extractor"): итог = REGISTRY_NAME/<repo><suffix>:latest. НЕ секрет — registry-хост подставляется внутри job из secrets.REGISTRY_NAME, не через caller.'
        required: false
        type: string
        default: ''

    secrets:
      HELM_REPO:
        required: true
      REGISTRY_NAME:
          required: true
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
          required: true  
      DO_TOKEN:
          required: true  
      TELEGRAM_TOKEN:
          required: true  
      TELEGRAM_CHAT_ID:
          required: true  
      BUILD_ARGS:
          required: false
      GIT_TOKEN:
          required: false
      PARAMS:
          description: 'Parameters for Helm Chart!!'
          required: false
      DOCKERHUB_USERNAME:
          required: false
      DOCKERHUB_TOKEN:
          required: false
      SENTRY_AUTH_TOKEN:
          description: 'Sentry user/org auth token для finalize-job (releases new/set-commits/finalize/deploys). Если не передан — finalize-job no-op.'
          required: false

jobs:
  build-docker:
    runs-on: ${{ inputs.build_runner }}
    defaults:
      run:
        shell: bash
    outputs:
      docker_tag: ${{ steps.export_tag.outputs.tag }}
      duration: ${{ steps.duration.outputs.time }}
      validation_error: ${{ steps.validate.outputs.error }}
    steps:
      - name: Validate required parameters
        id: validate
        run: |
          ERRORS=""
          if [[ "${{ inputs.with_submodules }}" == "true" && -z "${{ secrets.GIT_TOKEN }}" ]]; then
            ERRORS="${ERRORS}❌ with_submodules=true, но GIT_TOKEN не передан\n"
          fi
          if [[ -n "$ERRORS" ]]; then
            echo "error<<EOF" >> $GITHUB_OUTPUT
            echo -e "$ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "::error::Validation failed"
            exit 1
          fi

      - name: Start timer
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout deploying repository
        uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.with_submodules }}
          fetch-depth: 1
          # GIT_TOKEN нужен только для сабмодулей в чужих приватных репо; без него — откат на
          # встроенный GITHUB_TOKEN, которого достаточно для checkout своего (даже приватного) репо.
          token: ${{ secrets.GIT_TOKEN || github.token }}

      - name: Validate host build prerequisites
        if: inputs.build_mode == 'host'
        run: |
          if [[ ! -f Dockerfile.host ]]; then
            echo "::error::build_mode=host, но Dockerfile.host отсутствует в корне репо"
            exit 1
          fi
          if ! jq -e '.scripts["build:host"]' package.json > /dev/null; then
            echo "::error::build_mode=host, но в package.json нет script build:host"
            exit 1
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY_NAME}}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Set up Docker Buildx
        if: inputs.build_mode != 'host'
        uses: docker/setup-buildx-action@v4

      # host-режим: builder создаётся мгновенно, а его буст (pull buildkit-образа +
      # старт контейнера, ~8-9s) идёт в фоне параллельно с bun install / build:host.
      # build-push-action подхватит текущий builder; если буст ещё идёт — дождётся.
      - name: Prepare buildx in background (host)
        if: inputs.build_mode == 'host'
        run: |
          docker buildx create --name host-packer --use > /dev/null
          nohup docker buildx inspect --bootstrap > /dev/null 2>&1 &

      - name: Extract metadata (tags, labels) for Docker
        id: meta        
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.REGISTRY_NAME }}/${{ github.repository }}${{ inputs.image_suffix }}
          tags: |
           type=raw,value=latest

      - name: Export Docker tag safely
        id: export_tag
        run: |
          # Устанавливаем тег "latest" принудительно
          echo "tag=latest" >> $GITHUB_OUTPUT
          echo "Using tag: latest"

      - name: Build and push Docker image
        if: inputs.build_mode != 'host'
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ secrets.REGISTRY_NAME }}/${{ github.repository }}${{ inputs.image_suffix }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ secrets.BUILD_ARGS }}
            SENTRY_RELEASE=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=${{ inputs.cache_mode }}

      # === build_mode: host — build приложения на раннере, docker только пакует .output ===
      - name: Set up Bun
        if: inputs.build_mode == 'host'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (host)
        if: inputs.build_mode == 'host'
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build application (host)
        if: inputs.build_mode == 'host'
        env:
          NODE_ENV: production
          SENTRY_RELEASE: ${{ github.sha }}
          BUILD_ARGS: ${{ secrets.BUILD_ARGS }}
        run: |
          # BUILD_ARGS (VAR=val построчно) — те же пары, что в docker-режиме уходят
          # build-args'ами; здесь становятся env процесса сборки (в пределах шага).
          while IFS= read -r line; do
            [[ -z "${line// }" ]] && continue
            export "${line?}"
          done <<< "$BUILD_ARGS"
          bun run build:host

      # Пуш ТОЛЬКО через container-driver buildkit (Prepare buildx выше): движковый
      # пушер dockerd (docker push и buildx на default-builder) DOCR отвергает
      # с manifest invalid независимо от формата манифеста — проверено бенчем.
      - name: Package and push image (host)
        if: inputs.build_mode == 'host'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.host
          push: true
          tags: ${{ secrets.REGISTRY_NAME }}/${{ github.repository }}${{ inputs.image_suffix }}:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Calculate duration
        id: duration
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - ${{ steps.start.outputs.time }}))
          echo "time=${DURATION}s" >> $GITHUB_OUTPUT

  # Подготовка Kubernetes/Helm выполняется ПАРАЛЛЕЛЬНО со сборкой Docker образа
  prepare-k8s:
    runs-on: ubuntu-latest
    outputs:
      helm_params: ${{ steps.prepare_params.outputs.helm_params }}
      duration: ${{ steps.duration.outputs.time }}
    steps:
      - name: Start timer
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Get kubeconfig via API (no doctl needed)
        run: |
          mkdir -p $HOME/.kube
          
          # Получаем cluster ID
          CLUSTER_ID=$(curl -s -X GET "https://api.digitalocean.com/v2/kubernetes/clusters" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.kubernetes_clusters[] | select(.name=="main") | .id')
          
          echo "Cluster ID: $CLUSTER_ID"
          
          # Получаем kubeconfig с токеном (expiry 1 час = 3600 сек)
          curl -s -X GET "https://api.digitalocean.com/v2/kubernetes/clusters/${CLUSTER_ID}/kubeconfig?expiry_seconds=3600" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            > $HOME/.kube/config
          
          chmod 600 $HOME/.kube/config
          echo "Kubeconfig downloaded successfully"
          kubectl cluster-info

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Login to Helm Repository 
        run: helm repo add --username ${{ secrets.REGISTRY_USERNAME }} --password ${{ secrets.REGISTRY_PASSWORD }} helm_repo ${{secrets.HELM_REPO}}/
    
      - name: Update Helm Repository 
        run: helm repo update helm_repo

      - name: Prepare Helm parameters
        id: prepare_params
        run: |
          validate_probe_delay() {
            local source_name="$1"
            local source_data="$2"

            while IFS= read -r raw_line; do
              # Trim spaces and skip empty lines.
              line="$(echo "$raw_line" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
              [[ -z "$line" ]] && continue

              key="${line%%=*}"
              value="${line#*=}"
              case "$key" in
                app.livenessProbe.initialDelaySeconds|app.readinessProbe.initialDelaySeconds)
                  if ! [[ "$value" =~ ^[0-9]+$ ]]; then
                    echo "::error::Invalid $key value in $source_name: '$value'. Expected integer (e.g. 10)."
                    exit 1
                  fi
                  ;;
              esac
            done <<< "$source_data"
          }

          # Decode input parameters
          PARAMS_STR="${{ inputs.params }}"
          echo "Decoding input params: $PARAMS_STR"
          validate_probe_delay "inputs.params" "$PARAMS_STR"
          INPUT_PARAMS=$(echo "$PARAMS_STR" | grep -v '^\s*$' | awk '{print "--set", $0}' ORS=' ')
          
          # Decode secret parameters
          SECRET_PARAMS_STR="${{secrets.PARAMS}}"
          echo "Decoding secrets params: $SECRET_PARAMS_STR"
          validate_probe_delay "secrets.PARAMS" "$SECRET_PARAMS_STR"
          SECRET_PARAMS=$(echo "$SECRET_PARAMS_STR" | grep -v '^\s*$' | awk '{print "--set", $0}' ORS=' ')
          
          # Combine parameters (without image, will be added in deploy)
          BASE_PARAMS="$INPUT_PARAMS $SECRET_PARAMS --set app.name=${{ inputs.app_name }}"
          
          echo "helm_params<<EOF" >> $GITHUB_OUTPUT
          echo "$BASE_PARAMS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Package k8s config for deploy
        run: |
          mkdir -p /tmp/k8s-bundle
          cp -r $HOME/.kube /tmp/k8s-bundle/kube
          cp -r $HOME/.config/helm /tmp/k8s-bundle/config-helm 2>/dev/null || true
          cp -r $HOME/.cache/helm /tmp/k8s-bundle/cache-helm 2>/dev/null || true
          echo "Bundle contents:"
          ls -la /tmp/k8s-bundle/
          
      - name: Upload k8s bundle
        uses: actions/upload-artifact@v7
        with:
          name: k8s-bundle
          path: /tmp/k8s-bundle
          retention-days: 1

      - name: Calculate duration
        id: duration
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - ${{ steps.start.outputs.time }}))
          echo "time=${DURATION}s" >> $GITHUB_OUTPUT

  # Deploy теперь только скачивает артефакты и деплоит - максимально быстро!
  deploy:
    needs: [build-docker, prepare-k8s]
    runs-on: ubuntu-latest
    outputs:
      duration: ${{ steps.duration.outputs.time }}
    steps:
      - name: Start timer
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Download k8s bundle
        uses: actions/download-artifact@v8
        with:
          name: k8s-bundle
          path: /tmp/k8s-bundle

      - name: Restore k8s config
        run: |
          cp -r /tmp/k8s-bundle/kube $HOME/.kube
          chmod 600 $HOME/.kube/config
          mkdir -p $HOME/.config $HOME/.cache
          cp -r /tmp/k8s-bundle/config-helm $HOME/.config/helm 2>/dev/null || true
          cp -r /tmp/k8s-bundle/cache-helm $HOME/.cache/helm 2>/dev/null || true

      - name: Deploy to Kubernetes with Helm
        run: |
          # image-ref собираем ЗДЕСЬ: registry-хост (secrets.REGISTRY_NAME) доступен напрямую внутри
          # deploy-job. Протащить его через caller params/outputs нельзя — GitHub зануляет любой
          # output/param, содержащий ЗНАЧЕНИЕ secret, и helm_params уходит пустым (так ронялся прод).
          FULL_PARAMS="${{ needs.prepare-k8s.outputs.helm_params }} --set app.image=${{ secrets.REGISTRY_NAME }}/${{ github.repository }}${{ inputs.image_suffix }}:${{ needs.build-docker.outputs.docker_tag }}"

          echo "Full Params for Helm: $FULL_PARAMS"

          # Deploy using Helm
          helm upgrade ${{ inputs.app_name }} helm_repo/${{ inputs.helm_chart }} -i $FULL_PARAMS

          # Restart the deployment to ensure pods are updated
          kubectl rollout restart deployment ${{ inputs.app_name }}

      - name: Calculate duration
        id: duration
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - ${{ steps.start.outputs.time }}))
          echo "time=${DURATION}s" >> $GITHUB_OUTPUT

  # Sentry release finalize + auto-archive предыдущих:
  # - releases new            → создаёт release (no-op если уже создан implicitly SDK или vite-plugin'ом)
  # - releases set-commits    → линкует коммиты для suspect-commits в issues (--auto нужен .git → checkout). Non-fatal.
  # - releases finalize       → выставляет dateReleased → release получает "checkmark" вместо "Finalize" в UI
  # - releases deploys ... new → отдельная запись в Releases → Deploys (production env)
  # - archive prior releases  → API list open releases проекта → archive всё кроме current. Active filter в UI чист.
  # Пропускается если SENTRY_AUTH_TOKEN не передан или нет sentry_project/app_name.
  # Для Nuxt-проектов часть этого уже делает sentryVitePlugin на build — повтор безвреден (idempotent API).
  sentry-finalize:
    needs: [deploy]
    if: ${{ needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (для sentry-cli releases set-commits --auto — нужен локальный .git)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Finalize + archive prior Sentry releases
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: pushka-biz
          SENTRY_PROJECT: ${{ inputs.sentry_project != '' && inputs.sentry_project || inputs.app_name }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::notice::SENTRY_AUTH_TOKEN не передан — sentry-finalize пропущен"
            exit 0
          fi
          if [ -z "$SENTRY_PROJECT" ]; then
            echo "::notice::sentry_project/app_name пустой — sentry-finalize пропущен"
            exit 0
          fi
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli releases new "$SENTRY_RELEASE"
          sentry-cli releases set-commits "$SENTRY_RELEASE" --auto --ignore-missing \
            || echo "::warning::set-commits --auto не сработал (non-fatal — пропускаем suspect-commits)"
          sentry-cli releases finalize "$SENTRY_RELEASE"
          sentry-cli releases deploys "$SENTRY_RELEASE" new -e production

          # Auto-archive: список всех open releases проекта → archive всё кроме current.
          # API возвращает releases с участием project; archive выставляет status=archived
          # → Active filter в UI остаётся только с current release.
          echo "Archiving prior releases for project $SENTRY_PROJECT..."
          curl -sfH "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            "https://sentry.io/api/0/projects/$SENTRY_ORG/$SENTRY_PROJECT/releases/?per_page=100" \
            | jq -r '.[].version' \
            | while read -r v; do
              if [ -n "$v" ] && [ "$v" != "$SENTRY_RELEASE" ]; then
                sentry-cli releases archive "$v" \
                  && echo "  archived $v" \
                  || echo "::warning::archive $v failed (non-fatal)"
              fi
            done

  notify:
    needs: [build-docker, prepare-k8s, deploy]
    if: ${{ always() && (needs.build-docker.result != 'cancelled' || needs.prepare-k8s.result != 'cancelled') }}
    runs-on: ubuntu-latest
    steps:
      - name: Prepare commit info
        id: commit_info
        env:
          RAW_MSG: ${{ github.event.head_commit.message }}
          RAW_SHA: ${{ github.sha }}
        run: |
          # Надёжно: только subject-строка, truncate до 200 символов, HTML-escape.
          # Через env вниз по шагам, чтобы в bash не было GHA-интерполяции
          # (иначе любые " ` $ из коммита ломают MESSAGE="...").
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import os, html
          raw = os.environ.get("RAW_MSG", "") or ""
          # Первая непустая строка коммита
          first = next((ln.strip() for ln in raw.splitlines() if ln.strip()), "")
          if len(first) > 200:
              first = first[:200].rstrip() + "…"
          if not first:
              first = (os.environ.get("RAW_SHA", "") or "commit")[:7]
          print("html=" + html.escape(first, quote=True))
          PY

      - name: Send Validation Error to Telegram
        if: ${{ needs.build-docker.outputs.validation_error != '' }}
        run: |
          MESSAGE="⚠️ <b>Validation Failed</b> ⚠️

          📦 <b>Repo:</b> <code>${{ github.repository }}</code>
          🌿 <b>Branch:</b> <code>${{ github.ref_name }}</code>

          <b>Ошибки конфигурации:</b>
          ${{ needs.build-docker.outputs.validation_error }}

          <i>Деплой не запущен. Исправьте конфигурацию и запустите заново.</i>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE" \
            --data-urlencode "parse_mode=HTML"

      - name: Determine failed step
        id: failed_step
        if: ${{ needs.build-docker.outputs.validation_error == '' && (needs.build-docker.result == 'failure' || needs.prepare-k8s.result == 'failure' || needs.deploy.result == 'failure') }}
        run: |
          if [[ "${{ needs.build-docker.result }}" == "failure" ]]; then
            echo "step=🐳 Build Docker" >> $GITHUB_OUTPUT
            echo "job=build-docker" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.prepare-k8s.result }}" == "failure" ]]; then
            echo "step=⚙️ Prepare Kubernetes" >> $GITHUB_OUTPUT
            echo "job=prepare-k8s" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.deploy.result }}" == "failure" ]]; then
            echo "step=🚀 Deploy to Kubernetes" >> $GITHUB_OUTPUT
            echo "job=deploy" >> $GITHUB_OUTPUT
          fi

      - name: Send Failure Telegram Message
        if: ${{ needs.build-docker.outputs.validation_error == '' && (needs.build-docker.result == 'failure' || needs.prepare-k8s.result == 'failure' || needs.deploy.result == 'failure') }}
        env:
          COMMIT_HTML: ${{ steps.commit_info.outputs.html }}
        run: |
          MESSAGE="🔴 <b>DEPLOYMENT FAILED</b>

          👤 <b>Author:</b> <code>${{ github.actor }}</code>
          📦 <b>Repo:</b> <code>${{ github.repository }}</code>
          🌿 <b>Branch:</b> <code>${{ github.ref_name }}</code>

          ────────────────────
          💬 <b>Commit:</b>
          <a href=\"https://github.com/${{ github.repository }}/commit/${{ github.sha }}\">$COMMIT_HTML</a>

          ────────────────────
          ❌ <b>Failed Step:</b>
          <code>${{ steps.failed_step.outputs.step }}</code>

          ────────────────────
          🔗 <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Logs</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true"
  
      - name: Send Success Telegram Message
        if: ${{ needs.deploy.result == 'success' }}
        env:
          COMMIT_HTML: ${{ steps.commit_info.outputs.html }}
        run: |
          MESSAGE="🟢 <b>DEPLOY SUCCESSFUL</b>

          👤 <b>Author:</b> <code>${{ github.actor }}</code>
          📦 <b>Repo:</b> <code>${{ github.repository }}</code>

          ────────────────────
          💬 <b>Commit:</b>
          <a href=\"https://github.com/${{ github.repository }}/commit/${{ github.sha }}\">$COMMIT_HTML</a>

          ────────────────────
          ⏱️ <b>Performance:</b>
          ├ 🐳 Build: <code>${{ needs.build-docker.outputs.duration }}</code>
          ├ ☸️ Prepare: <code>${{ needs.prepare-k8s.outputs.duration }}</code>
          └ 📤 Deploy: <code>${{ needs.deploy.outputs.duration }}</code>

          🔗 <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Action Run</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true"
