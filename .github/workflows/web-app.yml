name: deploy template
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
        default: 'web-app'
      helm_chart:
        required: false
        type: string
        default: 'web-app'
      params:
        description: 'Parameters for Helm Chart'
        required: false
        type: string
      with_submodules:
        description: 'Checkout submodules'
        required: false
        type: boolean
        default: false
      cache_mode:
        description: 'Cache mode'
        required: false
        type: string
        default: 'min'
      build_runner:
        description: 'Runner for build-docker job'
        required: false
        type: string
        default: 'ubuntu-latest'

    secrets:
      HELM_REPO:
        required: true
      REGISTRY_NAME:
          required: true
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
          required: true  
      DO_TOKEN:
          required: true  
      TELEGRAM_TOKEN:
          required: true  
      TELEGRAM_CHAT_ID:
          required: true  
      BUILD_ARGS:
          required: false
      GIT_TOKEN:
          required: false
      PARAMS:
          description: 'Parameters for Helm Chart!!'
          required: false
      DOCKERHUB_USERNAME:
          required: false
      DOCKERHUB_TOKEN:
          required: false

jobs:
  build-docker:
    runs-on: ${{ inputs.build_runner }}
    defaults:
      run:
        shell: bash
    outputs:
      docker_tag: ${{ steps.export_tag.outputs.tag }}
      duration: ${{ steps.duration.outputs.time }}
      validation_error: ${{ steps.validate.outputs.error }}
    steps:
      - name: Validate required parameters
        id: validate
        run: |
          ERRORS=""
          if [[ "${{ inputs.with_submodules }}" == "true" && -z "${{ secrets.GIT_TOKEN }}" ]]; then
            ERRORS="${ERRORS}❌ with_submodules=true, но GIT_TOKEN не передан\n"
          fi
          if [[ -n "$ERRORS" ]]; then
            echo "error<<EOF" >> $GITHUB_OUTPUT
            echo -e "$ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "::error::Validation failed"
            exit 1
          fi

      - name: Start timer
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout deploying repository
        uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.with_submodules }}
          fetch-depth: 1
          token: ${{ secrets.GIT_TOKEN }}

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY_NAME}}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Extract metadata (tags, labels) for Docker
        id: meta        
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.REGISTRY_NAME }}/${{ github.repository }}
          tags: |
           type=raw,value=latest

      - name: Export Docker tag safely
        id: export_tag
        run: |
          # Устанавливаем тег "latest" принудительно
          echo "tag=latest" >> $GITHUB_OUTPUT
          echo "Using tag: latest"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.REGISTRY_NAME }}/${{ github.repository }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ secrets.BUILD_ARGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=${{ inputs.cache_mode }}

      - name: Calculate duration
        id: duration
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - ${{ steps.start.outputs.time }}))
          echo "time=${DURATION}s" >> $GITHUB_OUTPUT

  # Подготовка Kubernetes/Helm выполняется ПАРАЛЛЕЛЬНО со сборкой Docker образа
  prepare-k8s:
    runs-on: ubuntu-latest
    outputs:
      helm_params: ${{ steps.prepare_params.outputs.helm_params }}
      duration: ${{ steps.duration.outputs.time }}
    steps:
      - name: Start timer
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Get kubeconfig via API (no doctl needed)
        run: |
          mkdir -p $HOME/.kube
          
          # Получаем cluster ID
          CLUSTER_ID=$(curl -s -X GET "https://api.digitalocean.com/v2/kubernetes/clusters" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.kubernetes_clusters[] | select(.name=="main") | .id')
          
          echo "Cluster ID: $CLUSTER_ID"
          
          # Получаем kubeconfig с токеном (expiry 1 час = 3600 сек)
          curl -s -X GET "https://api.digitalocean.com/v2/kubernetes/clusters/${CLUSTER_ID}/kubeconfig?expiry_seconds=3600" \
            -H "Authorization: Bearer ${{ secrets.DO_TOKEN }}" \
            > $HOME/.kube/config
          
          chmod 600 $HOME/.kube/config
          echo "Kubeconfig downloaded successfully"
          kubectl cluster-info

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Login to Helm Repository 
        run: helm repo add --username ${{ secrets.REGISTRY_USERNAME }} --password ${{ secrets.REGISTRY_PASSWORD }} helm_repo ${{secrets.HELM_REPO}}/
    
      - name: Update Helm Repository 
        run: helm repo update helm_repo

      - name: Prepare Helm parameters
        id: prepare_params
        run: |
          validate_probe_delay() {
            local source_name="$1"
            local source_data="$2"

            while IFS= read -r raw_line; do
              # Trim spaces and skip empty lines.
              line="$(echo "$raw_line" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
              [[ -z "$line" ]] && continue

              key="${line%%=*}"
              value="${line#*=}"
              case "$key" in
                app.livenessProbe.initialDelaySeconds|app.readinessProbe.initialDelaySeconds)
                  if ! [[ "$value" =~ ^[0-9]+$ ]]; then
                    echo "::error::Invalid $key value in $source_name: '$value'. Expected integer (e.g. 10)."
                    exit 1
                  fi
                  ;;
              esac
            done <<< "$source_data"
          }

          # Decode input parameters
          PARAMS_STR="${{ inputs.params }}"
          echo "Decoding input params: $PARAMS_STR"
          validate_probe_delay "inputs.params" "$PARAMS_STR"
          INPUT_PARAMS=$(echo "$PARAMS_STR" | grep -v '^\s*$' | awk '{print "--set", $0}' ORS=' ')
          
          # Decode secret parameters
          SECRET_PARAMS_STR="${{secrets.PARAMS}}"
          echo "Decoding secrets params: $SECRET_PARAMS_STR"
          validate_probe_delay "secrets.PARAMS" "$SECRET_PARAMS_STR"
          SECRET_PARAMS=$(echo "$SECRET_PARAMS_STR" | grep -v '^\s*$' | awk '{print "--set", $0}' ORS=' ')
          
          # Combine parameters (without image, will be added in deploy)
          BASE_PARAMS="$INPUT_PARAMS $SECRET_PARAMS --set app.name=${{ inputs.app_name }}"
          
          echo "helm_params<<EOF" >> $GITHUB_OUTPUT
          echo "$BASE_PARAMS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Package k8s config for deploy
        run: |
          mkdir -p /tmp/k8s-bundle
          cp -r $HOME/.kube /tmp/k8s-bundle/kube
          cp -r $HOME/.config/helm /tmp/k8s-bundle/config-helm 2>/dev/null || true
          cp -r $HOME/.cache/helm /tmp/k8s-bundle/cache-helm 2>/dev/null || true
          echo "Bundle contents:"
          ls -la /tmp/k8s-bundle/
          
      - name: Upload k8s bundle
        uses: actions/upload-artifact@v7
        with:
          name: k8s-bundle
          path: /tmp/k8s-bundle
          retention-days: 1

      - name: Calculate duration
        id: duration
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - ${{ steps.start.outputs.time }}))
          echo "time=${DURATION}s" >> $GITHUB_OUTPUT

  # Deploy теперь только скачивает артефакты и деплоит - максимально быстро!
  deploy:
    needs: [build-docker, prepare-k8s]
    runs-on: ubuntu-latest
    outputs:
      duration: ${{ steps.duration.outputs.time }}
    steps:
      - name: Start timer
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Download k8s bundle
        uses: actions/download-artifact@v8
        with:
          name: k8s-bundle
          path: /tmp/k8s-bundle

      - name: Restore k8s config
        run: |
          cp -r /tmp/k8s-bundle/kube $HOME/.kube
          chmod 600 $HOME/.kube/config
          mkdir -p $HOME/.config $HOME/.cache
          cp -r /tmp/k8s-bundle/config-helm $HOME/.config/helm 2>/dev/null || true
          cp -r /tmp/k8s-bundle/cache-helm $HOME/.cache/helm 2>/dev/null || true

      - name: Deploy to Kubernetes with Helm
        run: |
          FULL_PARAMS="${{ needs.prepare-k8s.outputs.helm_params }} --set app.image=${{ secrets.REGISTRY_NAME }}/${{ github.repository }}:${{ needs.build-docker.outputs.docker_tag }}"
          
          echo "Full Params for Helm: $FULL_PARAMS"
          
          # Deploy using Helm
          helm upgrade ${{ inputs.app_name }} helm_repo/${{ inputs.helm_chart }} -i $FULL_PARAMS
          
          # Restart the deployment to ensure pods are updated
          kubectl rollout restart deployment ${{ inputs.app_name }}

      - name: Calculate duration
        id: duration
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - ${{ steps.start.outputs.time }}))
          echo "time=${DURATION}s" >> $GITHUB_OUTPUT

  notify:
    needs: [build-docker, prepare-k8s, deploy]
    if: ${{ always() && (needs.build-docker.result != 'cancelled' || needs.prepare-k8s.result != 'cancelled') }}
    runs-on: ubuntu-latest
    steps:
      - name: Prepare commit info
        id: commit_info
        env:
          RAW_MSG: ${{ github.event.head_commit.message }}
          RAW_SHA: ${{ github.sha }}
        run: |
          # Надёжно: только subject-строка, truncate до 200 символов, HTML-escape.
          # Через env вниз по шагам, чтобы в bash не было GHA-интерполяции
          # (иначе любые " ` $ из коммита ломают MESSAGE="...").
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import os, html
          raw = os.environ.get("RAW_MSG", "") or ""
          # Первая непустая строка коммита
          first = next((ln.strip() for ln in raw.splitlines() if ln.strip()), "")
          if len(first) > 200:
              first = first[:200].rstrip() + "…"
          if not first:
              first = (os.environ.get("RAW_SHA", "") or "commit")[:7]
          print("html=" + html.escape(first, quote=True))
          PY

      - name: Send Validation Error to Telegram
        if: ${{ needs.build-docker.outputs.validation_error != '' }}
        run: |
          MESSAGE="⚠️ <b>Validation Failed</b> ⚠️

          📦 <b>Repo:</b> <code>${{ github.repository }}</code>
          🌿 <b>Branch:</b> <code>${{ github.ref_name }}</code>

          <b>Ошибки конфигурации:</b>
          ${{ needs.build-docker.outputs.validation_error }}

          <i>Деплой не запущен. Исправьте конфигурацию и запустите заново.</i>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE" \
            --data-urlencode "parse_mode=HTML"

      - name: Determine failed step
        id: failed_step
        if: ${{ needs.build-docker.outputs.validation_error == '' && (needs.build-docker.result == 'failure' || needs.prepare-k8s.result == 'failure' || needs.deploy.result == 'failure') }}
        run: |
          if [[ "${{ needs.build-docker.result }}" == "failure" ]]; then
            echo "step=🐳 Build Docker" >> $GITHUB_OUTPUT
            echo "job=build-docker" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.prepare-k8s.result }}" == "failure" ]]; then
            echo "step=⚙️ Prepare Kubernetes" >> $GITHUB_OUTPUT
            echo "job=prepare-k8s" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.deploy.result }}" == "failure" ]]; then
            echo "step=🚀 Deploy to Kubernetes" >> $GITHUB_OUTPUT
            echo "job=deploy" >> $GITHUB_OUTPUT
          fi

      - name: Send Failure Telegram Message
        if: ${{ needs.build-docker.outputs.validation_error == '' && (needs.build-docker.result == 'failure' || needs.prepare-k8s.result == 'failure' || needs.deploy.result == 'failure') }}
        env:
          COMMIT_HTML: ${{ steps.commit_info.outputs.html }}
        run: |
          MESSAGE="🔴 <b>DEPLOYMENT FAILED</b>

          👤 <b>Author:</b> <code>${{ github.actor }}</code>
          📦 <b>Repo:</b> <code>${{ github.repository }}</code>
          🌿 <b>Branch:</b> <code>${{ github.ref_name }}</code>

          ────────────────────
          💬 <b>Commit:</b>
          <a href=\"https://github.com/${{ github.repository }}/commit/${{ github.sha }}\">$COMMIT_HTML</a>

          ────────────────────
          ❌ <b>Failed Step:</b>
          <code>${{ steps.failed_step.outputs.step }}</code>

          ────────────────────
          🔗 <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Logs</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true"
  
      - name: Send Success Telegram Message
        if: ${{ needs.deploy.result == 'success' }}
        env:
          COMMIT_HTML: ${{ steps.commit_info.outputs.html }}
        run: |
          MESSAGE="🟢 <b>DEPLOY SUCCESSFUL</b>

          👤 <b>Author:</b> <code>${{ github.actor }}</code>
          📦 <b>Repo:</b> <code>${{ github.repository }}</code>

          ────────────────────
          💬 <b>Commit:</b>
          <a href=\"https://github.com/${{ github.repository }}/commit/${{ github.sha }}\">$COMMIT_HTML</a>

          ────────────────────
          ⏱️ <b>Performance:</b>
          ├ 🐳 Build: <code>${{ needs.build-docker.outputs.duration }}</code>
          ├ ☸️ Prepare: <code>${{ needs.prepare-k8s.outputs.duration }}</code>
          └ 📤 Deploy: <code>${{ needs.deploy.outputs.duration }}</code>

          🔗 <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Action Run</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true"
